<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Geologica:wght@300;400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0e12;
      --surface: #17171f;
      --border: #2a2a38;
      --accent: #5b7bfa;
      --accent2: #a78bfa;
      --text: #e8e8f0;
      --muted: #7070a0;
      --green: #34d399;
      --card-bg: #1c1c28;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Geologica', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* — Background mesh — */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(91,123,250,.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(167,139,250,.13) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 420px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    /* — Header label — */
    .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* — Avatar — */
    .avatar-ring {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      padding: 3px;
      margin: 0 auto 20px;
      box-shadow: 0 0 32px rgba(91,123,250,.35);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 24px rgba(91,123,250,.3); }
      50%      { box-shadow: 0 0 48px rgba(167,139,250,.5); }
    }
    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 800;
      color: var(--accent);
      overflow: hidden;
    }
    .avatar-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    /* — Name block — */
    .username {
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.01em;
      margin-bottom: 6px;
    }
    .handle {
      text-align: center;
      font-size: 13px;
      color: var(--accent);
      font-weight: 400;
      margin-bottom: 28px;
    }

    /* — Stat cards — */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      transition: border-color .2s, transform .2s;
    }
    .stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .stat-card .sc-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .stat-card .sc-val {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      word-break: break-all;
    }
    .stat-card .sc-val.accent { color: var(--accent); }
    .stat-card .sc-val.green  { color: var(--green); }

    /* — Full-width row — */
    .full-row {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .full-row .fr-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .full-row .fr-text { flex: 1; }
    .full-row .fr-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .full-row .fr-val {
      font-size: 14px;
      font-weight: 500;
    }

    /* — Raw JSON block — */
    .raw-toggle {
      width: 100%;
      background: none;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--muted);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .08em;
      padding: 10px 16px;
      cursor: pointer;
      margin-top: 18px;
      transition: color .2s, border-color .2s;
    }
    .raw-toggle:hover { color: var(--text); border-color: var(--accent); }

    .raw-block {
      display: none;
      margin-top: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      line-height: 1.7;
      color: var(--muted);
      word-break: break-all;
      white-space: pre-wrap;
      animation: fadeIn .25s ease;
    }
    .raw-block.open { display: block; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }

    /* — Send button — */
    .send-btn {
      width: 100%;
      margin-top: 28px;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .02em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 6px 28px rgba(91,123,250,.35);
    }
    .send-btn:active { transform: scale(.97); }
    .send-btn:hover  { box-shadow: 0 8px 36px rgba(91,123,250,.55); }

    .send-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.15) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform .5s ease;
    }
    .send-btn:hover::after { transform: translateX(100%); }

    /* — Toast — */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green);
      color: #0e0e12;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 22px;
      border-radius: 40px;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      z-index: 100;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* — Skeleton shimmer — */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 14px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* — Loading state — */
    #loading { text-align: center; padding: 60px 0; }
    #loading p { color: var(--muted); font-size: 13px; margin-top: 16px; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #app { display: none; }

    .entry {
      opacity: 0;
      transform: translateY(12px);
      animation: rise .4s ease forwards;
    }
    .entry:nth-child(1) { animation-delay: .05s; }
    .entry:nth-child(2) { animation-delay: .1s; }
    .entry:nth-child(3) { animation-delay: .15s; }
    .entry:nth-child(4) { animation-delay: .2s; }
    .entry:nth-child(5) { animation-delay: .25s; }
    @keyframes rise { to { opacity:1; transform:none; } }
  </style>
</head>
<body>
<div class="wrap">

  <div id="loading">
    <div class="spinner"></div>
    <p>Загружаем данные…</p>
  </div>

  <div id="app">
    <div class="label entry">Telegram Mini App</div>

    <div class="avatar-ring entry">
      <div class="avatar-inner" id="avatar">?</div>
    </div>

    <div class="username entry" id="fullname">—</div>
    <div class="handle entry" id="handle">—</div>

    <div class="stats entry">
      <div class="stat-card">
        <div class="sc-label">User ID</div>
        <div class="sc-val accent" id="uid">—</div>
      </div>
      <div class="stat-card">
        <div class="sc-label">Язык</div>
        <div class="sc-val" id="lang">—</div>
      </div>
      <div class="stat-card">
        <div class="sc-label">Premium</div>
        <div class="sc-val green" id="premium">—</div>
      </div>
      <div class="stat-card">
        <div class="sc-label">Платформа</div>
        <div class="sc-val" id="platform">—</div>
      </div>
    </div>

    <div class="full-row entry">
      <div class="fr-icon">🎨</div>
      <div class="fr-text">
        <div class="fr-label">Тема</div>
        <div class="fr-val" id="theme">—</div>
      </div>
    </div>

    <div class="full-row entry">
      <div class="fr-icon">📱</div>
      <div class="fr-text">
        <div class="fr-label">Версия Web App</div>
        <div class="fr-val" id="version">—</div>
      </div>
    </div>

    <button class="raw-toggle entry" onclick="toggleRaw()">{ } Показать raw данные</button>
    <div class="raw-block" id="rawBlock"></div>

    <button class="send-btn entry" onclick="sendData()">
      ✈️ Отправить данные боту
    </button>
  </div>

</div>

<div class="toast" id="toast">✅ Данные отправлены!</div>

<script>
  const tg = window.Telegram?.WebApp;

  function init() {
    const loading = document.getElementById('loading');
    const app = document.getElementById('app');

    // Expand to full height
    if (tg) tg.expand();

    setTimeout(() => {
      loading.style.display = 'none';
      app.style.display = 'block';
      populate();
    }, 600);
  }

  function populate() {
    if (!tg) {
      // Dev fallback
      fillUI({
        id: 123456789,
        first_name: 'Иван',
        last_name: 'Иванов',
        username: 'ivan_dev',
        language_code: 'ru',
        is_premium: true,
        photo_url: null,
      }, {
        platform: 'web',
        version: '7.0',
        colorScheme: 'dark',
      });
      return;
    }

    const user = tg.initDataUnsafe?.user || {};
    fillUI(user, {
      platform: tg.platform,
      version: tg.version,
      colorScheme: tg.colorScheme,
    });

    // Raw JSON
    document.getElementById('rawBlock').textContent =
      JSON.stringify(tg.initDataUnsafe, null, 2);
  }

  function fillUI(user, meta) {
    const full = [user.first_name, user.last_name].filter(Boolean).join(' ') || 'Неизвестный';
    document.getElementById('fullname').textContent = full;
    document.getElementById('handle').textContent = user.username ? `@${user.username}` : 'без username';
    document.getElementById('uid').textContent = user.id || '—';
    document.getElementById('lang').textContent = user.language_code?.toUpperCase() || '—';
    document.getElementById('premium').textContent = user.is_premium ? '⭐ Да' : 'Нет';
    document.getElementById('platform').textContent = meta.platform || '—';
    document.getElementById('theme').textContent = meta.colorScheme === 'dark' ? '🌙 Тёмная' : '☀️ Светлая';
    document.getElementById('version').textContent = meta.version || '—';

    // Avatar letter or photo
    const av = document.getElementById('avatar');
    if (user.photo_url) {
      av.innerHTML = `<img src="${user.photo_url}" alt="avatar" />`;
    } else {
      av.textContent = (user.first_name || '?')[0].toUpperCase();
    }

    // Raw fallback
    if (!tg) {
      document.getElementById('rawBlock').textContent =
        JSON.stringify({ user, meta }, null, 2);
    }
  }

  function toggleRaw() {
    const block = document.getElementById('rawBlock');
    const btn = document.querySelector('.raw-toggle');
    const open = block.classList.toggle('open');
    btn.textContent = open ? '{ } Скрыть raw данные' : '{ } Показать raw данные';
  }

  function sendData() {
    const user = tg?.initDataUnsafe?.user || { id: 'dev', first_name: 'Dev' };
    const payload = JSON.stringify({
      user_id: user.id,
      username: user.username || null,
      first_name: user.first_name,
      last_name: user.last_name || null,
      language: user.language_code,
      is_premium: !!user.is_premium,
      timestamp: new Date().toISOString(),
    });

    if (tg?.sendData) {
      tg.sendData(payload);
    } else {
      console.log('sendData (dev):', payload);
      showToast();
    }
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Sync Telegram theme colors
  if (tg?.themeParams) {
    const tp = tg.themeParams;
    if (tp.bg_color)   document.documentElement.style.setProperty('--bg', tp.bg_color);
    if (tp.text_color) document.documentElement.style.setProperty('--text', tp.text_color);
  }

  init();
</script>
</body>
</html>
